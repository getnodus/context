# Claude Code — lightweight caller. The heavy logic lives in getnodus/workflow.
# Write @claude in an issue/PR/review comment (OWNER / MEMBER / COLLABORATOR only).

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    uses: getnodus/workflow/.github/workflows/claude.yml@f750d696aca7d5687b60dd58ab5d8365621e5bff # main
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
