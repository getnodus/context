# PR Auto-Fix — lightweight caller. The heavy logic lives in getnodus/workflow.
# When CI fails or PRs are conflicted, Claude Code auto-repairs them.

name: PR Auto-Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch: {}

jobs:
  call:
    uses: getnodus/workflow/.github/workflows/pr-autofix.yml@e690497f5d49c04166878aed55095f7f04a43e0c # main
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
