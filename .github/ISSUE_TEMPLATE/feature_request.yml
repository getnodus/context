name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. ("Agent X loses memory when Y" beats "add a Y flag".)
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Idea (optional)
      description: If you have a proposal in mind, share it — but the problem above matters more.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which surface does this touch?
      options:
        - CLI (`context`)
        - MCP server
        - HTTP server / protocol
        - Backends (local / http / mirror / module)
        - Agent registry / `built-in.ts`
        - Docs (README / AGENTS / CONTRIBUTING)
        - Build / release / CI
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent(s) is this for?
      description: If the request is agent-specific (e.g. Claude Desktop, Cursor), tell us which.
      multiple: true
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - Windsurf
        - Cline
        - Zed
        - VS Code Copilot
        - Codex
        - Gemini CLI
        - Other / not agent-specific
  - type: textarea
    id: workaround
    attributes:
      label: Workaround you're using today (if any)
      description: Helps us judge how painful the gap actually is.
  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I searched [open issues](https://github.com/getnodus/context/issues) for an existing request.
          required: true
        - label: I'm willing to help test or implement this (optional).
