name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. ("Agent X loses memory when Y" beats "add a Y flag".)
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Idea (optional)
      description: If you have a proposal in mind, share it — but the problem above matters more.
