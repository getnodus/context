name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you see instead?
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `context doctor --json`
      description: Paste the JSON. Redact any tokens if present (the field is `backend.token`).
      render: json
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `context --version` (or `context capabilities --json | jq .version`).
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: macOS / Linux / WSL, and the Node version (`node -v`).
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, agent name (Claude Desktop / Cursor / …), etc.
